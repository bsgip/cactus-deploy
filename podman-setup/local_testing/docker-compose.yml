# Teststack compose file — for local development and manual smoke testing.
#
# All containers share one network namespace via the infra service, mirroring a Podman pod.
# This means every container reaches its siblings on localhost, which is identical to the
# live environment — the env vars here are the exact values PodmanTeststackManager passes.
#
# Startup order mirrors the k8s pod:
#   postgres (healthy) → teststack-init (schema) → db-ready (healthy) → app containers
#   rabbitmq (healthy) ────────────────────────────────────────────────→ taskiq-worker / envoy
#
# db-ready is a sentinel service that polls `SELECT 1 FROM site LIMIT 1` — the same probe
# used by the k8s envoy-db readiness check — and only becomes healthy once migrations are done.
# This avoids the Podman 4.x --requires bug (requires container to be *running*; teststack-init
# exits after completion) while still guaranteeing schema-before-app ordering.
#
# Usage:
#   cp sample.env .env          # fill in image tags
#   podman-compose up -d
#   curl http://localhost:18080/health         # runner
#   curl http://localhost:18000/status/version?check_data=false   # envoy
#   podman-compose down -v      # teardown + remove volumes

services:

  # Holds the shared network namespace.  All other services join it via network_mode.
  # Host-reachable ports are declared here (remapped to 18xxx to avoid conflicts).
  infra:
    image: docker.io/library/busybox:latest
    command: sleep infinity
    ports:
      - "18000:8000"   # envoy (direct access for debugging only — device traffic goes via runner on 18080)
      - "18001:8001"   # envoy-admin
      - "18080:8080"   # runner (device traffic proxied through here to envoy)

  postgres:
    image: ${CACTUS_ENVOY_DB_IMAGE:-docker.io/library/postgres:15}
    network_mode: "service:infra"
    depends_on:
      infra:
        condition: service_started
    environment:
      POSTGRES_USER: envoy
      POSTGRES_PASSWORD: envoy
      POSTGRES_DB: envoy
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "envoy", "-d", "envoy"]
      interval: 1s
      timeout: 5s
      retries: 60

  rabbitmq:
    image: docker.io/library/rabbitmq:3
    network_mode: "service:infra"
    depends_on:
      infra:
        condition: service_started
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "teststack_cookie"
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-setcookie teststack_cookie"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 12

  # One-shot: writes the envoy schema and exits.  Waits for postgres to be healthy first.
  teststack-init:
    image: ${CACTUS_TESTSTACK_INIT_IMAGE}
    network_mode: "service:infra"
    depends_on:
      infra:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      ENVOY_DATABASE_URL: postgresql://envoy:envoy@localhost/envoy

  # Sentinel: polls SELECT 1 FROM site until teststack-init migrations are applied, then stays
  # running so app containers can gate on service_healthy.  Mirrors the k8s envoy-db readiness
  # probe that blocks main containers until the schema exists.
  db-ready:
    image: ${CACTUS_ENVOY_DB_IMAGE:-docker.io/library/postgres:15}
    network_mode: "service:infra"
    depends_on:
      infra:
        condition: service_started
      postgres:
        condition: service_healthy
    command: >
      sh -c "until psql postgresql://envoy:envoy@localhost/envoy -c 'SELECT 1 FROM site LIMIT 1' > /dev/null 2>&1; do sleep 1; done && sleep infinity"
    healthcheck:
      test: ["CMD-SHELL", "psql postgresql://envoy:envoy@localhost/envoy -c 'SELECT 1 FROM site LIMIT 1'"]
      interval: 2s
      timeout: 5s
      retries: 120

  envoy:
    image: ${CACTUS_ENVOY_APP_IMAGE}
    network_mode: "service:infra"
    depends_on:
      infra:
        condition: service_started
      db-ready:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://envoy:envoy@localhost/envoy
      HREF_PREFIX: /envoy-svc-local
      CERT_HEADER: ssl-client-cert
      ENABLE_NOTIFICATIONS: "True"
      RABBIT_MQ_BROKER_URL: amqp://guest:guest@localhost:5672
      ALLOW_DEVICE_REGISTRATION: "True"
      STATIC_REGISTRATION_PIN: "11111"
      LOG_CONFIG: logconf.server.json
      NOTIFICATION_DISABLE_TLS_VERIFY: "True"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/status/version?check_data=false\")'"]
      interval: 5s
      start_period: 30s
      retries: 36
    volumes:
      - shared:/shared

  envoy-admin:
    image: ${CACTUS_ENVOY_APP_IMAGE}
    network_mode: "service:infra"
    depends_on:
      infra:
        condition: service_started
      db-ready:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    environment:
      APP_MODULE: envoy.admin.main:app
      PORT: "8001"
      DATABASE_URL: postgresql+asyncpg://envoy:envoy@localhost/envoy
      CERT_HEADER: ssl-client-cert
      ENABLE_NOTIFICATIONS: "True"
      RABBIT_MQ_BROKER_URL: amqp://guest:guest@localhost:5672
      ALLOW_DEVICE_REGISTRATION: "True"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: password
      LOG_CONFIG: logconf.admin.json
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/status/health?check_data=false\")'"]
      interval: 5s
      start_period: 30s
      retries: 36
    volumes:
      - shared:/shared

  taskiq-worker:
    image: ${CACTUS_ENVOY_APP_IMAGE}
    network_mode: "service:infra"
    depends_on:
      infra:
        condition: service_started
      db-ready:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    command:
      - taskiq
      - worker
      - --no-configure-logging
      - envoy.notification.main:broker
      - envoy.notification.task.check
      - envoy.notification.task.transmit
    environment:
      DATABASE_URL: postgresql+asyncpg://envoy:envoy@localhost/envoy
      HREF_PREFIX: /envoy-svc-local
      CERT_HEADER: ssl-client-cert
      ENABLE_NOTIFICATIONS: "True"
      RABBIT_MQ_BROKER_URL: amqp://guest:guest@localhost:5672
      ALLOW_DEVICE_REGISTRATION: "True"
      LOG_CONFIG: logconf.notification.json
    volumes:
      - shared:/shared

  runner:
    image: ${CACTUS_RUNNER_IMAGE}
    network_mode: "service:infra"
    depends_on:
      infra:
        condition: service_started
      db-ready:
        condition: service_healthy
    restart: on-failure
    environment:
      APP_PORT: "8080"
      SERVER_URL: http://localhost:8000
      DATABASE_URL: postgresql+psycopg://envoy:envoy@localhost/envoy
      ENVOY_ADMIN_BASICAUTH_USERNAME: admin
      ENVOY_ADMIN_BASICAUTH_PASSWORD: password
      HEADER_MEDIA_PARAM_VALUE: ${CSIP_AUS_VERSION:-1.3}
    volumes:
      - shared:/shared
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/health\")'"]
      interval: 5s
      start_period: 30s
      retries: 5

volumes:
  pg-data:
  rabbitmq-data:
  shared:
